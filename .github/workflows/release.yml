name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build and publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag matches package version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "Release tag ${GITHUB_REF_NAME} must match package.json version ${VERSION}."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack

      - name: Publish stable release to npm latest
        if: ${{ github.event.release.prerelease == false }}
        run: npm publish --tag latest

      - name: Publish prerelease to npm beta
        if: ${{ github.event.release.prerelease == true }}
        run: npm publish --tag beta

      - name: Upload npm tarball to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" ./*.tgz --clobber

      - name: Attach PRs and contributors to release notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/update-release-notes.cjs
